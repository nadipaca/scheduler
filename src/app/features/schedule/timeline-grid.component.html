<div
  class="timeline-grid"
  [style.width.px]="trackWidthPx"
>
  <!-- Today vertical indicator -->
  <div
    *ngIf="todayX !== null"
    class="timeline-grid__today-line"
    [style.left.px]="todayX"
  ></div>

  <app-work-center-row
    *ngFor="let row of rows; let i = index"
    class="timeline-grid__row"
    [class.timeline-grid__row--even]="i % 2 === 0"
    [workCenter]="row.workCenter"
    [workOrders]="row.workOrders"
    [zoom]="zoom"
    [visibleRange]="visibleRange"
    (createRequested)="onRowCreateRequested($event)"
    (editRequested)="onRowEditRequested($event)"
    (deleteRequested)="onRowDeleteRequested($event)"
  >
  </app-work-center-row>
</div>
