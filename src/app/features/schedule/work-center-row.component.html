<div class="work-center-row">
  <div
    class="work-center-row__lane"
    (click)="onLaneClick($event)"
  >
    <app-work-order-bar
      *ngFor="let wo of workOrders"
      [workOrder]="wo"
      [zoom]="zoom"
      [visibleRange]="visibleRange"
      (barClick)="onBarClick($event)"
      (edit)="onBarEdit(wo)"
      (delete)="onBarDelete(wo)"
    >
    </app-work-order-bar>
  </div>
</div>
