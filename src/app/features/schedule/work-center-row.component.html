<div
  class="work-center-row"
  (click)="onRowClick($event)"
>
  <div #lane class="work-center-row__lane">
    <app-work-order-bar
      *ngFor="let wo of workOrders"
      [workOrder]="wo"
      [zoom]="zoom"
      [visibleRange]="visibleRange"
      (barClick)="onBarClick($event)"
      (edit)="onBarEdit(wo)"
      (delete)="onBarDelete(wo)"
    >
    </app-work-order-bar>
  </div>
</div>
