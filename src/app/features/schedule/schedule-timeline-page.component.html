<div
  class="app-shell schedule-page"
  [class.schedule-page--panel-open]="panelOpen"
>
  <app-timeline-header
    [zoom]="zoom"
    [visibleRange]="visibleRange"
    (zoomChange)="onZoomChange($event)"
  ></app-timeline-header>

  <div class="schedule-main">
    <div
      class="schedule-main__left"
      [style.width.px]="leftColumnWidth"
    >
      <div class="schedule-main__left-header">Work Center</div>
      <div
        class="schedule-main__left-list"
        *ngIf="(workCenters$ | async) as centers"
      >
        <div
          *ngFor="let wc of centers"
          class="schedule-main__left-item"
        >
          {{ wc.data.name }}
        </div>
      </div>
    </div>

    <div class="schedule-main__right">
      <div
        #timelineScroll
        class="schedule-main__right-scroll"
      >
        <app-timeline-grid
          [zoom]="zoom"
          [visibleRange]="visibleRange"
          [workCenters]="(workCenters$ | async) ?? []"
          [workOrders]="(workOrders$ | async) ?? []"
          [selectedWorkOrderId]="selectedWorkOrder?.docId ?? null"
          (createRequested)="onCreateRequested($event)"
          (editRequested)="onEditRequested($event)"
          (deleteRequested)="onDeleteRequested($event)"
          (selectRequested)="onSelectRequested($event)"
        ></app-timeline-grid>
      </div>
    </div>
  </div>

  <app-work-order-panel
    *ngIf="panelOpen && selectedWorkCenter"
    [open]="panelOpen"
    [mode]="panelMode"
    [workCenter]="selectedWorkCenter!"
    [workOrder]="selectedWorkOrder"
    [suggestedStartDate]="suggestedStartDate"
    [allOrders]="ordersForSelectedCenter"
    (closed)="onPanelClosed()"
    (submitOrder)="onPanelSubmit($event)"
  ></app-work-order-panel>
</div>
