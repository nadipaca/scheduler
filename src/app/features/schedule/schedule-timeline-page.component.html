<div class="app-shell schedule-page">
  <!-- Top header: title + timescale + time header row -->
  <app-timeline-header
    [zoom]="zoom"
    [visibleRange]="visibleRange"
    (zoomChange)="onZoomChange($event)"
  ></app-timeline-header>

  <!-- Main area: left fixed column + right scrollable timeline -->
  <div class="schedule-main">
    <!-- Left: fixed work center list -->
    <div
      class="schedule-main__left"
      [style.width.px]="leftColumnWidth"
    >
      <div class="schedule-main__left-header">
        Work Center
      </div>

      <div class="schedule-main__left-list" *ngIf="(workCenters$ | async) as centers">
        <div
          *ngFor="let wc of centers"
          class="schedule-main__left-item"
        >
          {{ wc.data.name }}
        </div>
      </div>
    </div>

    <!-- Right: horizontally scrollable grid -->
    <div class="schedule-main__right">
      <div class="schedule-main__right-scroll">
        <app-timeline-grid
          [zoom]="zoom"
          [visibleRange]="visibleRange"
          [workCenters]="(workCenters$ | async) ?? []"
          [workOrders]="(workOrders$ | async) ?? []"
        ></app-timeline-grid>
      </div>
    </div>
  </div>
</div>
