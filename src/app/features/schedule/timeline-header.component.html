<header class="timeline-header" role="banner">
  <h1 class="timeline-header__title">Work Orders</h1>

 

  <!-- Time header row (aligns with scrollable grid) -->
  <div class="timeline-header__time-row" role="row" aria-label="Timeline columns">
     <div class="timeline-header__controls-row">
    <div
      class="timescale-control"
      role="group"
      aria-label="Timeline zoom level"
    >
      <span class="timescale-control__label" id="timescale-label">Timescale</span>
      <ng-select
        class="timescale-control__select"
        [items]="zoomOptions"
        bindLabel="label"
        bindValue="value"
        [clearable]="false"
        [searchable]="false"
        [ngModel]="zoom"
        (ngModelChange)="onZoomSelect($event)"
        aria-labelledby="timescale-label"
        appendTo="body"
      >
      </ng-select>
    </div>
  </div>
    <div class="timeline-header__time-track" role="presentation">
      <div
        *ngFor="let cell of headerCells"
        class="timeline-header__time-cell"
        [class.timeline-header__time-cell--current]="isCurrentPeriod(cell)"
        [style.width.px]="getCellWidthPx(cell)"
        role="columnheader"
        [attr.aria-current]="isCurrentPeriod(cell) ? 'date' : null"
      >
        <span
          *ngIf="isCurrentPeriod(cell)"
          class="timeline-header__current-badge"
          aria-hidden="true"
        >
          {{ currentPeriodLabel }}
        </span>
        <span class="timeline-header__time-cell-label">{{ cell.label }}</span>
      </div>
    </div>
  </div>
</header>
