<header class="timeline-header" role="banner">
  <h1 class="timeline-header__title">Work Orders</h1>

  <div class="timeline-header__controls-row">
    <div
      class="timescale-control"
      role="group"
      aria-label="Timeline zoom level"
    >
      <ng-select
        class="timescale-control__select"
        [items]="zoomOptions"
        bindLabel="label"
        bindValue="value"
        [clearable]="false"
        [searchable]="false"
        [ngModel]="zoom"
        (ngModelChange)="onZoomSelect($event)"
        appendTo="body"
        panelClass="timescale-panel"
      >
        <ng-template ng-label-tmp let-item="item">
          <span class="timescale-label-badge">Timescale</span>
          <span class="timescale-value-text">{{ item.label }}</span>
        </ng-template>
      </ng-select>
    </div>

    <button
      type="button"
      class="header-btn header-btn--today"
      (click)="todayClick.emit()"
      title="Scroll to today"
    >
      Today
    </button>

    <button
      type="button"
      class="header-btn header-btn--reset"
      (click)="resetClick.emit()"
      title="Reset to sample data"
    >
      Reset data
    </button>
  </div>
</header>
